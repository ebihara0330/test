<iframe id="myIframe" src="assets/Storylinehtml/story.html"></iframe>

<script>
  var iframe = document.getElementById('myIframe');

  iframe.onload = function() {
    var innerDoc = iframe.contentDocument || iframe.contentWindow.document;
    var contentBody = innerDoc.body;

   alert(contentBody.scrollWidth );
    // コンテンツの幅と高さに iframe の高さと幅を合わせる
    var contentWidth = contentBody.scrollWidth || contentBody.offsetWidth;
    var contentHeight = contentBody.scrollHeight || contentBody.offsetHeight;
    iframe.style.width = contentWidth + 'px';
    iframe.style.height = contentHeight + 'px';
  };
</script>
